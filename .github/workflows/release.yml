name: Release to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SemVer tag
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match vX.Y.Z exactly; got ${GITHUB_REF#refs/tags/}"
            exit 1
          fi

  # Run tests before releasing
  test:
    needs: validate-release-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.ref }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

    - name: Install dependencies
      run: uv sync --dev

    - name: Run ruff linter
      run: uv run ruff check src/ tests/

    - name: Check ruff formatting
      run: uv run ruff format --check src/ tests/

    - name: Run mypy type checker
      run: uv run mypy src/

    - name: Run core tests
      run: uv run pytest

    - name: Run validation tests
      run: uv run pytest -m validation

    - name: Run release integrity tests
      run: uv run pytest tests/test_release_integrity.py

  security-audit:
    needs: validate-release-tag
    permissions:
      contents: read
      actions: none
      checks: none
      deployments: none
      id-token: none
      issues: none
      discussions: none
      packages: none
      pages: none
      pull-requests: none
      repository-projects: none
      security-events: none
      statuses: none
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install dependencies
        run: uv sync --frozen --only-group security

      - name: Export runtime requirements
        run: uv export --frozen --no-dev --no-emit-project --format requirements.txt --output-file runtime-requirements.txt

      - name: Run pip-audit
        run: uv run --no-sync pip-audit --requirement runtime-requirements.txt --disable-pip

  # Build and publish to PyPI
  release:
    needs: [test, security-audit]
    runs-on: ubuntu-latest
    environment: release  # Requires manual approval
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.ref }}

    - name: Validate version consistency
      run: |
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
          echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
          exit 1
        fi
        echo "Version validated: $TAG_VERSION"

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: dist
        path: dist/
        retention-days: 30

    - name: Upload to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # pinned from release/v1
      # Uses trusted publishing - no token needed when configured

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create the GitHub Release

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: dist
        path: dist/

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
